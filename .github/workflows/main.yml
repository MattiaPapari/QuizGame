name: Quiz Game CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit & Integration Tests
        # Qui Maven eseguirà AuthTest, LobbyTest, GameSyncTest, ecc.
        run: mvn test

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Build Docker Image
        run: docker build -t quiz-game-server .